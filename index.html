<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Simulator</title>
  <style>
    body {
      margin: 0;
      background: #0a0f16;
      color: #d5e2f3;
      font-family: ui-sans-serif, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 12px;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    button, select {
      background: #111b28;
      color: #d5e2f3;
      border: 1px solid #274466;
      border-radius: 6px;
      padding: 6px 10px;
    }
    .link-btn {
      background: #111b28;
      color: #d5e2f3;
      border: 1px solid #274466;
      border-radius: 6px;
      padding: 6px 10px;
      text-decoration: none;
      display: inline-block;
      font-size: 13px;
    }
    .link-btn:hover {
      border-color: #3a6090;
      color: #eef5ff;
    }
    #stats {
      font-size: 14px;
      color: #9eb7d4;
      min-height: 20px;
    }
    #details {
      font-size: 13px;
      color: #7e98b8;
      min-height: 18px;
      max-width: 900px;
      text-align: center;
    }
    canvas {
      border: 1px solid #274466;
      border-radius: 8px;
      image-rendering: pixelated;
      cursor: crosshair;
    }
    #species-tooltip {
      position: fixed;
      display: none;
      background: #0d1a2a;
      border: 1px solid #3a6090;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #d5e2f3;
      pointer-events: none;
      z-index: 100;
      max-width: 260px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.55);
      line-height: 1.6;
    }
    #species-tooltip .tt-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #species-tooltip .tt-swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #species-tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #9eb7d4;
    }
    #species-tooltip .tt-row span:last-child {
      color: #d5e2f3;
      font-weight: 500;
    }
    #species-tooltip .tt-divider {
      border: none;
      border-top: 1px solid #1e3050;
      margin: 6px 0;
    }
    #species-tooltip .tt-fact {
      color: #7ec8a8;
      font-style: italic;
      font-size: 12px;
    }
    .settings-panel {
      background: #0d1a2a;
      border: 1px solid #274466;
      border-radius: 8px;
      padding: 12px;
      max-width: 900px;
      width: 100%;
    }
    .settings-panel h3 {
      margin: 0 0 10px 0;
      font-size: 15px;
      color: #d5e2f3;
      cursor: pointer;
      user-select: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .settings-panel h3::before {
      content: '▼';
      font-size: 11px;
      transition: transform 0.2s;
    }
    .settings-panel.collapsed h3::before {
      transform: rotate(-90deg);
    }
    .settings-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 10px;
    }
    .settings-panel.collapsed .settings-grid {
      display: none;
    }
    .setting-item {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }
    .setting-item label {
      font-size: 12px;
      color: #9eb7d4;
    }
    .setting-item input[type="number"] {
      background: #111b28;
      color: #d5e2f3;
      border: 1px solid #274466;
      border-radius: 4px;
      padding: 4px 6px;
      font-size: 13px;
      width: 100%;
    }
    .setting-item input[type="number"]:focus {
      outline: none;
      border-color: #3a6090;
    }
  </style>
</head>
<body>
  <h1>Living Simulator</h1>
  <div class="controls">
    <label for="speed">Speed</label>
    <select id="speed">
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="5">5x</option>
      <option value="10">10x</option>
      <option value="20">20x</option>
      <option value="40">40x</option>
      <option value="80">80x</option>
    </select>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
    <button id="apocalypse">Apocalypse</button>
    <a class="link-btn" href="./help.html">Stats &amp; graphics help</a>
  </div>
  <div id="stats"></div>
  <div id="details"></div>
  <div class="settings-panel" id="settings-panel">
    <h3 id="settings-toggle">Simulation Settings</h3>
    <div class="settings-grid">
      <div class="setting-item">
        <label for="base-organisms">Base Organisms</label>
        <input type="number" id="base-organisms" value="48" min="1" max="200" step="1">
      </div>
      <div class="setting-item">
        <label for="max-organisms">Max Organisms</label>
        <input type="number" id="max-organisms" value="1521" min="100" max="5000" step="1">
      </div>
      <div class="setting-item">
        <label for="reproduction-energy">Reproduction Energy</label>
        <input type="number" id="reproduction-energy" value="120" min="50" max="300" step="1">
      </div>
      <div class="setting-item">
        <label for="reproduction-cost">Reproduction Cost</label>
        <input type="number" id="reproduction-cost" value="70" min="10" max="150" step="1">
      </div>
      <div class="setting-item">
        <label for="tick-damage">Tick Damage</label>
        <input type="number" id="tick-damage" value="0.22" min="0.01" max="1" step="0.01">
      </div>
      <div class="setting-item">
        <label for="movement-speed">Movement Speed Multiplier</label>
        <input type="number" id="movement-speed" value="0.5" min="0.1" max="2" step="0.1">
      </div>
      <div class="setting-item">
        <label for="max-hunters">Max Hunters</label>
        <input type="number" id="max-hunters" value="25" min="1" max="100" step="1">
      </div>
      <div class="setting-item">
        <label for="hunter-spawn-interval">Hunter Spawn Interval</label>
        <input type="number" id="hunter-spawn-interval" value="720" min="100" max="2000" step="10">
      </div>
      <div class="setting-item">
        <label for="min-pop-hunter">Min Pop for Hunter Spawn</label>
        <input type="number" id="min-pop-hunter" value="85" min="10" max="500" step="1">
      </div>
      <div class="setting-item">
        <label for="hunter-min-speed">Hunter Min Speed</label>
        <input type="number" id="hunter-min-speed" value="1.05" min="0.5" max="3" step="0.05">
      </div>
      <div class="setting-item">
        <label for="hunter-max-speed">Hunter Max Speed</label>
        <input type="number" id="hunter-max-speed" value="1.75" min="0.5" max="5" step="0.05">
      </div>
      <div class="setting-item">
        <label for="hunter-base-drain">Hunter Base Drain</label>
        <input type="number" id="hunter-base-drain" value="28" min="5" max="100" step="1">
      </div>
      <div class="setting-item">
        <label for="prey-size-weight">Prey Size Score Weight</label>
        <input type="number" id="prey-size-weight" value="14" min="1" max="50" step="1">
      </div>
      <div class="setting-item">
        <label for="apocalypse-min">Apocalypse Min Interval</label>
        <input type="number" id="apocalypse-min" value="1800" min="500" max="5000" step="100">
      </div>
      <div class="setting-item">
        <label for="apocalypse-max">Apocalypse Max Interval</label>
        <input type="number" id="apocalypse-max" value="3500" min="1000" max="10000" step="100">
      </div>
    </div>
  </div>
  <canvas id="world" width="900" height="560"></canvas>
  <div id="species-tooltip"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
