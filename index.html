<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Living Simulator</title>
  <style>
    body {
      margin: 0;
      background: #0a0f16;
      color: #d5e2f3;
      font-family: ui-sans-serif, system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 12px;
    }
    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    button, select {
      background: #111b28;
      color: #d5e2f3;
      border: 1px solid #274466;
      border-radius: 6px;
      padding: 6px 10px;
    }
    #stats {
      font-size: 14px;
      color: #9eb7d4;
      min-height: 20px;
    }
    #details {
      font-size: 13px;
      color: #7e98b8;
      min-height: 18px;
      max-width: 900px;
      text-align: center;
    }
    canvas {
      border: 1px solid #274466;
      border-radius: 8px;
      image-rendering: pixelated;
      cursor: crosshair;
    }
    #species-tooltip {
      position: fixed;
      display: none;
      background: #0d1a2a;
      border: 1px solid #3a6090;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #d5e2f3;
      pointer-events: none;
      z-index: 100;
      max-width: 260px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.55);
      line-height: 1.6;
    }
    #species-tooltip .tt-title {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #species-tooltip .tt-swatch {
      display: inline-block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    #species-tooltip .tt-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: #9eb7d4;
    }
    #species-tooltip .tt-row span:last-child {
      color: #d5e2f3;
      font-weight: 500;
    }
    #species-tooltip .tt-divider {
      border: none;
      border-top: 1px solid #1e3050;
      margin: 6px 0;
    }
    #species-tooltip .tt-fact {
      color: #7ec8a8;
      font-style: italic;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Living Simulator</h1>
  <div class="controls">
    <label for="speed">Speed</label>
    <select id="speed">
      <option value="1">1x</option>
      <option value="2">2x</option>
      <option value="5">5x</option>
      <option value="10">10x</option>
      <option value="20">20x</option>
      <option value="40">40x</option>
      <option value="80">80x</option>
    </select>
    <button id="pause">Pause</button>
    <button id="reset">Reset</button>
  </div>
  <div id="stats"></div>
  <div id="details"></div>
  <canvas id="world" width="900" height="560"></canvas>
  <div id="species-tooltip"></div>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
